<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</helmet>
<header style="position:sticky;top:0;z-index:200;background:#FFFFFF;border-bottom:1px solid #E7E9F1;font-family:'Manrope',sans-serif">
  <div style="max-width:1280px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:24px">
    <a href="Home.dc.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;flex:none">
      <div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#4338CA,#6366F1);display:flex;align-items:center;justify-content:center">
        <dc-import name="Icon" icon-name="{{ 'trending' }}" size="{{ 18 }}" color="{{ '#fff' }}" hint-size="20,20"></dc-import>
      </div>
      <span style="font-size:19px;font-weight:800;color:#1E1B4B;letter-spacing:-0.02em">PriceRadar</span>
    </a>

    <div style="flex:1;max-width:560px;position:relative">
      <div style="display:flex;align-items:center;gap:8px;background:#F3F4F9;border:1px solid #E7E9F1;border-radius:12px;padding:9px 14px">
        <dc-import name="Icon" icon-name="{{ 'search' }}" size="{{ 17 }}" color="{{ '#6B7280' }}" hint-size="20,20"></dc-import>
        <input
          type="text"
          placeholder="Search phones, laptops, beauty, groceries..."
          value="{{ query }}"
          onChange="{{ onQueryChange }}"
          onKeyDown="{{ onSearchKeyDown }}"
          onFocus="{{ onSearchFocus }}"
          style="border:none;background:none;outline:none;flex:1;font:600 14px 'Manrope',sans-serif;color:#1E1B4B" />
      </div>
      <sc-if value="{{ showSuggestions }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #E7E9F1;border-radius:12px;box-shadow:0 16px 40px rgba(30,27,75,0.14);overflow:hidden;z-index:250">
          <sc-for list="{{ suggestions }}" as="s" hint-placeholder-count="4">
            <div onClick="{{ s.onClick }}" style="padding:10px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px" style-hover="background:#F3F4F9">
              <span style="font-size:13.5px;font-weight:600;color:#27253F">{{ s.title }}</span>
              <span style="font-size:12px;color:#8B88A3">{{ s.categoryName }}</span>
            </div>
          </sc-for>
          <sc-if value="{{ hasNoSuggestions }}" hint-placeholder-val="{{ false }}">
            <div style="padding:14px;font-size:13px;color:#8B88A3">No matches yet — try "iPhone" or "AC"</div>
          </sc-if>
        </div>
      </sc-if>
    </div>

    <div style="position:relative;flex:none">
      <button onClick="{{ toggleCountryMenu }}" style="display:flex;align-items:center;gap:6px;background:#F3F4F9;border:1px solid #E7E9F1;border-radius:10px;padding:8px 12px;cursor:pointer;font:700 13px 'Manrope',sans-serif;color:#1E1B4B">
        <dc-import name="Icon" icon-name="{{ 'globe' }}" size="{{ 15 }}" color="{{ '#4338CA' }}" hint-size="20,20"></dc-import>
        {{ countryLabel }}
        <dc-import name="Icon" icon-name="{{ 'chevron-down' }}" size="{{ 13 }}" color="{{ '#6B7280' }}" hint-size="20,20"></dc-import>
      </button>
      <sc-if value="{{ countryMenuOpen }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #E7E9F1;border-radius:10px;box-shadow:0 16px 40px rgba(30,27,75,0.14);overflow:hidden;min-width:150px;z-index:250">
          <sc-for list="{{ countryOptions }}" as="c" hint-placeholder-count="3">
            <div onClick="{{ c.onClick }}" style="padding:10px 14px;cursor:pointer;font:600 13px 'Manrope',sans-serif;color:#27253F;display:flex;justify-content:space-between" style-hover="background:#F3F4F9">
              {{ c.label }}
              <sc-if value="{{ c.active }}" hint-placeholder-val="{{ false }}"><dc-import name="Icon" icon-name="{{ 'check' }}" size="{{ 14 }}" color="{{ '#16A34A' }}" hint-size="20,20"></dc-import></sc-if>
            </div>
          </sc-for>
        </div>
      </sc-if>
    </div>

    <nav style="display:flex;align-items:center;gap:20px;flex:none">
      <div style="position:relative">
        <button onClick="{{ toggleCatMenu }}" style="background:none;border:none;cursor:pointer;font:700 13.5px 'Manrope',sans-serif;color:{{ categoriesColor }};display:flex;align-items:center;gap:4px">
          Categories <dc-import name="Icon" icon-name="{{ 'chevron-down' }}" size="{{ 13 }}" color="{{ categoriesColor }}" hint-size="20,20"></dc-import>
        </button>
        <sc-if value="{{ catMenuOpen }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#fff;border:1px solid #E7E9F1;border-radius:14px;box-shadow:0 20px 50px rgba(30,27,75,0.16);padding:12px;z-index:250;display:grid;grid-template-columns:repeat(3,150px);gap:2px">
            <sc-for list="{{ categoryLinks }}" as="cat" hint-placeholder-count="9">
              <a href="{{ cat.href }}" style="display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;text-decoration:none;color:#27253F" style-hover="background:#F3F4F9">
                <dc-import name="Icon" icon-name="{{ cat.icon }}" size="{{ 16 }}" color="{{ '#4338CA' }}" hint-size="20,20"></dc-import>
                <span style="font-size:12.5px;font-weight:600">{{ cat.name }}</span>
              </a>
            </sc-for>
          </div>
        </sc-if>
      </div>
      <a href="{{ dealsHref }}" style="text-decoration:none;font:700 13.5px 'Manrope',sans-serif;color:{{ dealsColor }}">Deals</a>
      <a href="Wishlist.dc.html" style="text-decoration:none;font:700 13.5px 'Manrope',sans-serif;color:{{ alertsColor }};display:flex;align-items:center;gap:5px">
        <dc-import name="Icon" icon-name="{{ 'bell' }}" size="{{ 15 }}" color="{{ alertsColor }}" hint-size="20,20"></dc-import>
        Alerts
        <sc-if value="{{ hasWishlist }}" hint-placeholder-val="{{ false }}">
          <span style="background:#16A34A;color:#fff;font-size:10px;font-weight:800;border-radius:8px;padding:1px 6px">{{ wishlistCount }}</span>
        </sc-if>
      </a>
      <a href="Blog.dc.html" style="text-decoration:none;font:700 13.5px 'Manrope',sans-serif;color:{{ blogColor }}">Blog</a>

      <sc-if value="{{ loggedIn }}" hint-placeholder-val="{{ false }}">
        <div style="position:relative">
          <button onClick="{{ toggleUserMenu }}" style="display:flex;align-items:center;gap:7px;background:#EEF0FB;border:none;border-radius:20px;padding:6px 12px 6px 6px;cursor:pointer">
            <div style="width:26px;height:26px;border-radius:50%;background:#4338CA;color:#fff;display:flex;align-items:center;justify-content:center;font:800 12px 'Manrope',sans-serif">{{ userInitial }}</div>
            <span style="font:700 13px 'Manrope',sans-serif;color:#1E1B4B">{{ userName }}</span>
          </button>
          <sc-if value="{{ userMenuOpen }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid #E7E9F1;border-radius:12px;box-shadow:0 16px 40px rgba(30,27,75,0.14);min-width:180px;overflow:hidden;z-index:250">
              <a href="Dashboard.dc.html" style="display:block;padding:11px 16px;text-decoration:none;font:600 13px 'Manrope',sans-serif;color:#27253F" style-hover="background:#F3F4F9">Dashboard</a>
              <a href="Wishlist.dc.html" style="display:block;padding:11px 16px;text-decoration:none;font:600 13px 'Manrope',sans-serif;color:#27253F" style-hover="background:#F3F4F9">Wishlist &amp; Alerts</a>
              <a href="Admin.dc.html" style="display:block;padding:11px 16px;text-decoration:none;font:600 13px 'Manrope',sans-serif;color:#27253F" style-hover="background:#F3F4F9">Admin Dashboard</a>
              <div onClick="{{ handleLogout }}" style="padding:11px 16px;cursor:pointer;font:600 13px 'Manrope',sans-serif;color:#DC2626;border-top:1px solid #F0F0F5">Log out</div>
            </div>
          </sc-if>
        </div>
      </sc-if>
      <sc-if value="{{ notLoggedIn }}" hint-placeholder-val="{{ true }}">
        <a href="Login.dc.html" style="text-decoration:none;background:#4338CA;color:#fff;font:700 13px 'Manrope',sans-serif;padding:9px 18px;border-radius:10px">Login / Signup</a>
      </sc-if>
    </nav>
  </div>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:72},&quot;activePage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;search&quot;,&quot;categories&quot;,&quot;deals&quot;,&quot;wishlist&quot;,&quot;blog&quot;,&quot;product&quot;,&quot;dashboard&quot;,&quot;admin&quot;,&quot;login&quot;]},&quot;initialQuery&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = {
    query: this.props.initialQuery || '',
    showSuggestions: false,
    countryMenuOpen: false,
    catMenuOpen: false,
    userMenuOpen: false,
    country: 'IN',
    user: null,
    wishlist: [],
    data: null,
  };

  async componentDidMount() {
    const data = await import('./data.js');
    const app = data.getAppState();
    this.data = data;
    this.setState({ data, country: app.country, user: app.user, wishlist: app.wishlist });
  }

  onQueryChange = (e) => this.setState({ query: e.target.value, showSuggestions: true });
  onSearchFocus = () => this.setState({ showSuggestions: true });
  goSearch = () => {
    const q = encodeURIComponent(this.state.query || '');
    window.location.href = `Search.dc.html?q=${q}&country=${this.state.country}`;
  };
  onSearchKeyDown = (e) => { if (e.key === 'Enter') this.goSearch(); };

  toggleCountryMenu = () => this.setState(s => ({ countryMenuOpen: !s.countryMenuOpen, catMenuOpen: false, userMenuOpen: false }));
  toggleCatMenu = () => this.setState(s => ({ catMenuOpen: !s.catMenuOpen, countryMenuOpen: false, userMenuOpen: false }));
  toggleUserMenu = () => this.setState(s => ({ userMenuOpen: !s.userMenuOpen, countryMenuOpen: false, catMenuOpen: false }));

  setCountry = (code) => {
    if (this.data) this.data.setCountry(code);
    this.setState({ country: code, countryMenuOpen: false });
    window.location.reload();
  };

  handleLogout = () => {
    if (this.data) this.data.logout();
    window.location.href = 'Home.dc.html';
  };

  renderVals() {
    const { data, country, user, wishlist, query, showSuggestions, countryMenuOpen, catMenuOpen, userMenuOpen } = this.state;
    const active = this.props.activePage || '';
    const activeC = '#4338CA';
    const idleC = '#4B4A63';

    const CATEGORY_ICON_FALLBACK = [
      { id: 'mobiles', name: 'Mobiles', icon: 'phone' }, { id: 'laptops', name: 'Laptops', icon: 'laptop' },
      { id: 'ac', name: 'Air Conditioners', icon: 'snow' }, { id: 'beauty', name: 'Beauty', icon: 'sparkle' },
      { id: 'shoes', name: 'Shoes', icon: 'shoe' }, { id: 'watches', name: 'Watches', icon: 'watch' },
      { id: 'grocery', name: 'Grocery', icon: 'basket' }, { id: 'headphones', name: 'Headphones', icon: 'headphone' },
      { id: 'appliances', name: 'Washing Machines', icon: 'washer' },
    ];
    const cats = (data ? data.CATEGORIES : CATEGORY_ICON_FALLBACK);

    let suggestions = [];
    if (data && query && query.length > 0) {
      suggestions = data.getProducts({ query, country }).slice(0, 6).map(p => ({
        title: p.title, categoryName: p.categoryName,
        onClick: () => { window.location.href = `Product.dc.html?slug=${p.slug}`; },
      }));
    }

    return {
      query, showSuggestions: showSuggestions && query && query.length > 0,
      suggestions, hasNoSuggestions: showSuggestions && query && query.length > 0 && suggestions.length === 0,
      onQueryChange: this.onQueryChange, onSearchFocus: this.onSearchFocus, onSearchKeyDown: this.onSearchKeyDown,
      countryLabel: country === 'IN' ? 'India' : country === 'AE' ? 'UAE' : 'Global',
      toggleCountryMenu: this.toggleCountryMenu, countryMenuOpen,
      countryOptions: [
        { label: 'India', active: country === 'IN', onClick: () => this.setCountry('IN') },
        { label: 'UAE', active: country === 'AE', onClick: () => this.setCountry('AE') },
        { label: 'Global', active: country === 'GLOBAL', onClick: () => this.setCountry('GLOBAL') },
      ],
      toggleCatMenu: this.toggleCatMenu, catMenuOpen,
      categoriesColor: active === 'categories' ? activeC : idleC,
      categoryLinks: cats.map(c => ({ name: c.name, icon: c.icon, href: `Category.dc.html?id=${c.id}&country=${country}` })),
      dealsHref: `Deals.dc.html?country=${country}`, dealsColor: active === 'deals' ? activeC : idleC,
      alertsColor: active === 'wishlist' ? activeC : idleC,
      hasWishlist: wishlist.length > 0, wishlistCount: wishlist.length,
      blogColor: active === 'blog' ? activeC : idleC,
      loggedIn: !!user, notLoggedIn: !user,
      userInitial: user ? user.name.charAt(0).toUpperCase() : '',
      userName: user ? user.name.split(' ')[0] : '',
      toggleUserMenu: this.toggleUserMenu, userMenuOpen, handleLogout: this.handleLogout,
    };
  }
}

</script>
</body>
</html>
